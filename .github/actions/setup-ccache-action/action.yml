name: 'Setup CCache'
inputs:
  ccache-path:  # id of input
    required: true
    default: '/usr/lib'
runs:
  using: "composite"
  steps:
      - name: Setup CCache
        run: |
          eval $(printf 'PATH=${{ inputs.ccache-path }}/ccache:%s\n' "$PATH" | tee -a "$GITHUB_ENV")
          cat <<EOF >>"$GITHUB_ENV"
          CCACHE_MAXSIZE=500M
          CCACHE_DIR=$HOME/.cache/ccache
          CCACHE_BASEDIR=$PWD
          EOF
      - name: Cache compilation
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ matrix.compiler }}-${{ matrix.os }}
          restore-keys: |
            ccache-${{ matrix.compiler }}